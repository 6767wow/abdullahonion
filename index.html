<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Onion</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      gap: 32px;
    }

    .input-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }

    input[type="text"] {
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 8px;
      color: #fff;
      font-size: 18px;
      padding: 12px 24px;
      outline: none;
      text-align: center;
      width: 280px;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: rgba(255, 255, 255, 0.7);
    }

    input[type="text"]::placeholder {
      color: rgba(255, 255, 255, 0.3);
    }

    .result {
      font-size: 28px;
      font-weight: 500;
      color: #fff;
      min-height: 40px;
      letter-spacing: 2px;
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      text-shadow:
        0 0 8px rgba(255, 255, 255, 0.9),
        0 0 20px rgba(255, 255, 255, 0.6),
        0 0 40px rgba(255, 255, 255, 0.3);
    }

    .result.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .onion-img {
      width: 160px;
      opacity: 0.85;
      display: block;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <div class="input-wrapper">
    <input type="text" id="onionInput" placeholder="type something..." autocomplete="off" />
    <div class="result" id="resultText">Encrypt "abdullahonion"</div>
  </div>

  <img class="onion-img" src="onion.png" alt="onion" />

  <script>
    const input = document.getElementById('onionInput');
    const result = document.getElementById('resultText');

    input.addEventListener('input', () => {
      const val = input.value.trim();
      if (val.toLowerCase() === 'onion') {
        result.textContent = 'Encrypt "abdullahonion"';
        result.classList.add('visible');
      } else if (val === 'YWJkdWxsYWhvbmlvbg==') {
        result.textContent = 'test';
        result.classList.add('visible');
      } else {
        result.classList.remove('visible');
      }
    });
  </script>

</body>
</html>
